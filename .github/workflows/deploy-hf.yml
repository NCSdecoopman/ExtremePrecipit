name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Supprime tout sauf /data/result/preanalysis et /data/binaires/metadata.json
          rm -rf .git .github src data/raw data/external data/processed
          find data/binaires -type f ! -name "metadata.json" -delete

          # Le répertoire courant devient la racine
          git init
          git config user.email "ncsdecoopman@github.com"
          git config user.name "NCSdecoopman"
          git branch -M main
          git remote add hf https://ncsdecoopman:${HF_TOKEN}@huggingface.co/spaces/ncsdecoopman/extreme-precip-app.git
          git add .
          git commit -m "Deploy app to HF Space"
          git push hf main --force