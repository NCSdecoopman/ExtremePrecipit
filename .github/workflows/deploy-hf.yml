name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Supprime tout sauf ce qu'on veut
          rm -rf .git .github data src

          # Le répertoire courant devient la racine
          git init
          git config user.email "ncs@decoopman.com"
          git config user.name "NCSdecoopman"
          git remote add hf https://ncsdecoopman:${HF_TOKEN}@huggingface.co/spaces/ncsdecoopman/extreme-precip-app.git
          git add .
          git commit -m "Deploy app to HF Space"
          git push hf master --force